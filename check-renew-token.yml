##############################################################################
# GitLab CI - Vérification & Renouvellement automatique d'un PAT GitLab
#
# Variables CI/CD requises (Settings > CI/CD > Variables) :
#   - ADMIN_TOKEN      : PAT avec scope "api" (pour appeler l'API GitLab)
#   - TOKEN_GITLAB     : Le token à surveiller / renouveler
#   - GITLAB_USER_ID   : ID numérique du user propriétaire du token
#   - TOKEN_NAME       : Nom du token à recréer (ex: "deploy-token")
#   - TOKEN_SCOPES     : Scopes séparés par des espaces (ex: "api read_registry")
#
# Optionnel :
#   - RENEW_THRESHOLD_DAYS : Nombre de jours avant expiration pour déclencher
#                            le renouvellement (défaut: 7)
#   - TOKEN_VALIDITY_DAYS  : Durée de validité du nouveau token (défaut: 90)
##############################################################################

stages:
  - check-token
  - renew-token

variables:
  GITLAB_API_URL: "${CI_SERVER_URL}/api/v4"
  RENEW_THRESHOLD_DAYS: "7"
  TOKEN_VALIDITY_DAYS: "90"
  TOKEN_NAME: "deploy-token"
  TOKEN_SCOPES: "api read_repository"

# ---------------------------------------------------------------------------
# Stage 1 : Vérifier la date d'expiration du token
# ---------------------------------------------------------------------------
check_token_expiry:
  stage: check-token
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl jq coreutils
  script:
    - |
      echo "========================================="
      echo "  Vérification du token TOKEN_GITLAB"
      echo "========================================="

      # --- Récupérer les infos des PAT du user ---
      RESPONSE=$(curl -s --fail-with-body \
        --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
        "${GITLAB_API_URL}/personal_access_tokens/self" \
        -H "PRIVATE-TOKEN: ${TOKEN_GITLAB}" \
        2>/dev/null)

      # Fallback : lister les tokens du user via l'admin API
      if [ -z "$RESPONSE" ] || echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
        echo "[INFO] Utilisation de l'API admin pour inspecter les tokens..."
        RESPONSE=$(curl -s --fail-with-body \
          --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
          "${GITLAB_API_URL}/personal_access_tokens?user_id=${GITLAB_USER_ID}&state=active" \
          | jq --arg name "$TOKEN_NAME" '[.[] | select(.name == $name)] | first')
      fi

      if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "null" ]; then
        echo "[ERREUR] Impossible de trouver le token '${TOKEN_NAME}'."
        echo "NEEDS_RENEWAL=true" > token_status.env
        exit 0
      fi

      # --- Extraire la date d'expiration ---
      EXPIRES_AT=$(echo "$RESPONSE" | jq -r '.expires_at // empty')
      TOKEN_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

      if [ -z "$EXPIRES_AT" ]; then
        echo "[WARN] Le token n'a pas de date d'expiration définie."
        echo "NEEDS_RENEWAL=false" > token_status.env
        exit 0
      fi

      echo "[INFO] Token ID       : ${TOKEN_ID}"
      echo "[INFO] Expiration      : ${EXPIRES_AT}"

      # --- Calculer le nombre de jours restants ---
      EXPIRES_EPOCH=$(date -d "${EXPIRES_AT}" +%s)
      NOW_EPOCH=$(date +%s)
      DAYS_LEFT=$(( (EXPIRES_EPOCH - NOW_EPOCH) / 86400 ))

      echo "[INFO] Jours restants  : ${DAYS_LEFT}"
      echo "[INFO] Seuil renouv.   : ${RENEW_THRESHOLD_DAYS} jours"

      if [ "$DAYS_LEFT" -le "$RENEW_THRESHOLD_DAYS" ]; then
        echo ""
        echo "[ACTION] ⚠️  Le token expire dans ${DAYS_LEFT} jour(s)."
        echo "[ACTION] Renouvellement nécessaire."
        echo "NEEDS_RENEWAL=true" > token_status.env
        echo "OLD_TOKEN_ID=${TOKEN_ID}" >> token_status.env
      else
        echo ""
        echo "[OK] ✅ Le token est encore valide pour ${DAYS_LEFT} jour(s)."
        echo "NEEDS_RENEWAL=false" > token_status.env
      fi
  artifacts:
    reports:
      dotenv: token_status.env

# ---------------------------------------------------------------------------
# Stage 2 : Renouveler le token et mettre à jour la variable CI/CD
# ---------------------------------------------------------------------------
renew_token:
  stage: renew-token
  image: alpine:3.19
  needs:
    - job: check_token_expiry
      artifacts: true
  rules:
    - if: '$NEEDS_RENEWAL == "true"'
      when: always
    - when: never
  before_script:
    - apk add --no-cache curl jq coreutils
  script:
    - |
      echo "========================================="
      echo "  Renouvellement du token TOKEN_GITLAB"
      echo "========================================="

      # --- Révoquer l'ancien token (si on a son ID) ---
      if [ -n "${OLD_TOKEN_ID}" ]; then
        echo "[INFO] Révocation de l'ancien token (ID: ${OLD_TOKEN_ID})..."
        curl -s --request DELETE \
          --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
          "${GITLAB_API_URL}/personal_access_tokens/${OLD_TOKEN_ID}" \
          && echo "[OK] Ancien token révoqué." \
          || echo "[WARN] Impossible de révoquer l'ancien token."
      fi

      # --- Calculer la nouvelle date d'expiration ---
      NEW_EXPIRES_AT=$(date -d "+${TOKEN_VALIDITY_DAYS} days" +%Y-%m-%d)
      echo "[INFO] Nouvelle expiration : ${NEW_EXPIRES_AT}"

      # --- Construire le payload JSON pour les scopes ---
      SCOPES_JSON=$(echo "${TOKEN_SCOPES}" | tr ' ' '\n' | jq -R . | jq -s .)

      # --- Créer le nouveau PAT via l'API Admin ---
      CREATE_RESPONSE=$(curl -s --fail-with-body \
        --request POST \
        --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"${TOKEN_NAME}\",
          \"expires_at\": \"${NEW_EXPIRES_AT}\",
          \"scopes\": ${SCOPES_JSON}
        }" \
        "${GITLAB_API_URL}/users/${GITLAB_USER_ID}/personal_access_tokens")

      NEW_TOKEN=$(echo "$CREATE_RESPONSE" | jq -r '.token // empty')

      if [ -z "$NEW_TOKEN" ]; then
        echo "[ERREUR] Échec de la création du nouveau token :"
        echo "$CREATE_RESPONSE" | jq .
        exit 1
      fi

      NEW_TOKEN_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
      echo "[OK] ✅ Nouveau token créé (ID: ${NEW_TOKEN_ID})"

      # --- Mettre à jour la variable CI/CD TOKEN_GITLAB ---
      echo "[INFO] Mise à jour de la variable CI/CD 'TOKEN_GITLAB'..."

      # Tenter un PUT (update), sinon POST (create)
      UPDATE_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
        --request PUT \
        --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
        --form "value=${NEW_TOKEN}" \
        --form "masked=true" \
        --form "protected=true" \
        "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/variables/TOKEN_GITLAB")

      if [ "$UPDATE_RESPONSE" = "200" ]; then
        echo "[OK] ✅ Variable TOKEN_GITLAB mise à jour avec succès."
      elif [ "$UPDATE_RESPONSE" = "404" ]; then
        echo "[INFO] Variable inexistante, création en cours..."
        curl -s --fail-with-body \
          --request POST \
          --header "PRIVATE-TOKEN: ${ADMIN_TOKEN}" \
          --form "key=TOKEN_GITLAB" \
          --form "value=${NEW_TOKEN}" \
          --form "masked=true" \
          --form "protected=true" \
          "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/variables" \
          && echo "[OK] ✅ Variable TOKEN_GITLAB créée." \
          || { echo "[ERREUR] Échec de la création de la variable."; exit 1; }
      else
        echo "[ERREUR] Code HTTP inattendu: ${UPDATE_RESPONSE}"
        exit 1
      fi

      echo ""
      echo "========================================="
      echo "  Renouvellement terminé avec succès !"
      echo "  Prochaine expiration : ${NEW_EXPIRES_AT}"
      echo "========================================="
