##############################################################################
# GitLab CI - Auto-renouvellement du Token (Self-Renewal)
#
# Le TOKEN_GITLAB (scope: api, validite 1 an) se renouvelle lui-meme.
# Tant qu'il est valide, il peut :
#   1. Verifier sa propre date d'expiration
#   2. Creer un nouveau PAT pour le meme user
#   3. Mettre a jour la variable CI/CD avec la nouvelle valeur
#   4. Revoquer l'ancien token
#
# Variables CI/CD requises (Settings > CI/CD > Variables) :
#   - TOKEN_GITLAB          : Le token a surveiller (scope: api) [masked]
#   - GITLAB_USER_ID        : ID numerique du user proprietaire
#   - TOKEN_NAME            : Nom du token (ex: "ci-deploy-token")
#   - TOKEN_SCOPES          : Scopes separes par espaces (ex: "api read_repository")
#
# Optionnel :
#   - RENEW_THRESHOLD_DAYS  : Jours restants avant renouvellement (defaut: 20)
#   - TOKEN_VALIDITY_DAYS   : Duree du nouveau token en jours (defaut: 365)
##############################################################################

stages:
  - check-token
  - renew-token

variables:
  GITLAB_API_URL: "${CI_SERVER_URL}/api/v4"
  RENEW_THRESHOLD_DAYS: "20"
  TOKEN_VALIDITY_DAYS: "365"
  TOKEN_NAME: "ci-deploy-token"
  TOKEN_SCOPES: "api read_repository"

# ---------------------------------------------------------------------------
# Stage 1 : Verifier la date d'expiration du token
# ---------------------------------------------------------------------------
check_token_expiry:
  stage: check-token
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl jq coreutils
  script:
    - |
      echo "========================================="
      echo "  Verification de TOKEN_GITLAB (self)"
      echo "========================================="

      # --- Le token s'inspecte lui-meme ---
      RESPONSE=$(curl -s --fail-with-body \
        --header "PRIVATE-TOKEN: ${TOKEN_GITLAB}" \
        "${GITLAB_API_URL}/personal_access_tokens/self")

      if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
        echo "[ERREUR] Impossible d'interroger le token. Il est peut-etre deja expire !"
        echo "[ERREUR] Intervention manuelle requise."
        exit 1
      fi

      # --- Extraire les infos ---
      TOKEN_ID=$(echo "$RESPONSE" | jq -r '.id')
      EXPIRES_AT=$(echo "$RESPONSE" | jq -r '.expires_at // empty')
      TOKEN_ACTIVE=$(echo "$RESPONSE" | jq -r '.active')
      TOKEN_REVOKED=$(echo "$RESPONSE" | jq -r '.revoked')

      echo "[INFO] Token ID       : ${TOKEN_ID}"
      echo "[INFO] Actif           : ${TOKEN_ACTIVE}"
      echo "[INFO] Revoque         : ${TOKEN_REVOKED}"
      echo "[INFO] Expiration      : ${EXPIRES_AT}"

      if [ "$TOKEN_ACTIVE" != "true" ]; then
        echo "[ERREUR] Le token n'est pas actif !"
        exit 1
      fi

      if [ -z "$EXPIRES_AT" ] || [ "$EXPIRES_AT" = "null" ]; then
        echo "[INFO] Pas de date d'expiration definie. Rien a faire."
        echo "NEEDS_RENEWAL=false" > token_status.env
        exit 0
      fi

      # --- Calculer les jours restants ---
      EXPIRES_EPOCH=$(date -d "${EXPIRES_AT}" +%s)
      NOW_EPOCH=$(date +%s)
      DAYS_LEFT=$(( (EXPIRES_EPOCH - NOW_EPOCH) / 86400 ))

      echo "[INFO] Jours restants  : ${DAYS_LEFT}"
      echo "[INFO] Seuil renouv.   : ${RENEW_THRESHOLD_DAYS} jours"
      echo ""

      if [ "$DAYS_LEFT" -le "$RENEW_THRESHOLD_DAYS" ]; then
        echo "[ACTION] Le token expire dans ${DAYS_LEFT} jour(s) -> Renouvellement necessaire."
        echo "NEEDS_RENEWAL=true" > token_status.env
        echo "OLD_TOKEN_ID=${TOKEN_ID}" >> token_status.env
      else
        echo "[OK] Le token est valide encore ${DAYS_LEFT} jour(s). Rien a faire."
        echo "NEEDS_RENEWAL=false" > token_status.env
      fi
  artifacts:
    reports:
      dotenv: token_status.env

# ---------------------------------------------------------------------------
# Stage 2 : Renouveler le token (self-renewal)
# ---------------------------------------------------------------------------
renew_token:
  stage: renew-token
  image: alpine:3.19
  needs:
    - job: check_token_expiry
      artifacts: true
  rules:
    - if: '$NEEDS_RENEWAL == "true"'
      when: always
    - when: never
  before_script:
    - apk add --no-cache curl jq coreutils
  script:
    - |
      echo "========================================="
      echo "  Self-Renewal de TOKEN_GITLAB"
      echo "========================================="

      # --- 1. Creer un nouveau PAT (le token actuel est encore valide) ---
      NEW_EXPIRES_AT=$(date -d "+${TOKEN_VALIDITY_DAYS} days" +%Y-%m-%d)
      echo "[INFO] Nouvelle expiration : ${NEW_EXPIRES_AT}"

      SCOPES_JSON=$(echo "${TOKEN_SCOPES}" | tr ' ' '\n' | jq -R . | jq -s .)

      CREATE_RESPONSE=$(curl -s --fail-with-body \
        --request POST \
        --header "PRIVATE-TOKEN: ${TOKEN_GITLAB}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"${TOKEN_NAME}\",
          \"expires_at\": \"${NEW_EXPIRES_AT}\",
          \"scopes\": ${SCOPES_JSON}
        }" \
        "${GITLAB_API_URL}/users/${GITLAB_USER_ID}/personal_access_tokens")

      NEW_TOKEN=$(echo "$CREATE_RESPONSE" | jq -r '.token // empty')

      if [ -z "$NEW_TOKEN" ]; then
        echo "[ERREUR] Echec de la creation du nouveau token :"
        echo "$CREATE_RESPONSE" | jq .
        exit 1
      fi

      NEW_TOKEN_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
      echo "[OK] Nouveau token cree (ID: ${NEW_TOKEN_ID})"

      # --- 2. Mettre a jour la variable CI/CD TOKEN_GITLAB ---
      echo "[INFO] Mise a jour de la variable CI/CD 'TOKEN_GITLAB'..."

      UPDATE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
        --request PUT \
        --header "PRIVATE-TOKEN: ${TOKEN_GITLAB}" \
        --form "value=${NEW_TOKEN}" \
        --form "masked=true" \
        --form "protected=true" \
        "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/variables/TOKEN_GITLAB")

      if [ "$UPDATE_CODE" = "200" ]; then
        echo "[OK] Variable TOKEN_GITLAB mise a jour."
      elif [ "$UPDATE_CODE" = "404" ]; then
        echo "[INFO] Variable inexistante, creation..."
        curl -s --fail-with-body \
          --request POST \
          --header "PRIVATE-TOKEN: ${TOKEN_GITLAB}" \
          --form "key=TOKEN_GITLAB" \
          --form "value=${NEW_TOKEN}" \
          --form "masked=true" \
          --form "protected=true" \
          "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/variables" \
          && echo "[OK] Variable TOKEN_GITLAB creee." \
          || { echo "[ERREUR] Echec creation variable."; exit 1; }
      else
        echo "[ERREUR] Code HTTP inattendu: ${UPDATE_CODE}"
        exit 1
      fi

      # --- 3. Revoquer l'ancien token ---
      if [ -n "${OLD_TOKEN_ID}" ]; then
        echo "[INFO] Revocation de l'ancien token (ID: ${OLD_TOKEN_ID})..."
        # On utilise le NOUVEAU token pour revoquer l'ancien
        curl -s --request DELETE \
          --header "PRIVATE-TOKEN: ${NEW_TOKEN}" \
          "${GITLAB_API_URL}/personal_access_tokens/${OLD_TOKEN_ID}" \
          && echo "[OK] Ancien token revoque." \
          || echo "[WARN] Impossible de revoquer l'ancien token (il expirera naturellement)."
      fi

      echo ""
      echo "========================================="
      echo "  Self-Renewal termine avec succes !"
      echo "  Ancien token : ${OLD_TOKEN_ID} (revoque)"
      echo "  Nouveau token: ${NEW_TOKEN_ID}"
      echo "  Expiration   : ${NEW_EXPIRES_AT}"
      echo "========================================="
