# =============================================================================
# nginx.conf — Configuration principale production
# =============================================================================
worker_processes auto;
worker_rlimit_nofile 65535;

# Logs vers stdout/stderr (symlinks créés par l'image officielle nginx)
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # Access log DÉSACTIVÉ (production — traces gérées par service mesh)
    # -----------------------------------------------------------------------
    access_log off;

    # -----------------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # -----------------------------------------------------------------------
    # Sécurité — masquer la version Nginx
    # -----------------------------------------------------------------------
    server_tokens off;

    # -----------------------------------------------------------------------
    # Gzip
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # -----------------------------------------------------------------------
    # Virtual hosts
    # -----------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
